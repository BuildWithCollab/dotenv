name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: dotenv-windows-x64
          - os: ubuntu-latest
            toolchain: gcc-14
            artifact: dotenv-linux-x64
          - os: macos-latest
            toolchain: llvm
            artifact: dotenv-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@cc0f56c35b75d0975ed5d9e29005fae707721cd5 # v1

      - name: Install GCC 14 (Linux)
        if: matrix.toolchain == 'gcc-14'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Install LLVM/Clang (macOS)
        if: matrix.toolchain == 'llvm'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Configure (Linux GCC 14)
        if: matrix.toolchain == 'gcc-14'
        run: xmake config --toolchain=gcc -y

      - name: Configure (macOS LLVM)
        if: matrix.toolchain == 'llvm'
        run: xmake config --toolchain=llvm --sdk="$(brew --prefix llvm)" -y

      - name: Configure (Windows)
        if: matrix.toolchain == ''
        run: xmake config -y

      - name: Build
        run: xmake build

      - name: Run tests
        run: xmake run dotenv-tests

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp build/windows/x64/release/env.exe staging/env.exe
          cp build/windows/x64/release/env.exe staging/dotenv.exe
          cd staging && 7z a ../${{ matrix.artifact }}.zip *

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          binary=$(find build -name "env" -type f -not -name "*.cpp" -not -name "*.o" -not -name "*.d" | head -1)
          echo "Found binary: $binary"
          cp "$binary" staging/dotenv
          chmod +x staging/dotenv
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging dotenv

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --generate-notes \
            dotenv-windows-x64/*.zip \
            dotenv-linux-x64/*.tar.gz \
            dotenv-macos-arm64/*.tar.gz
